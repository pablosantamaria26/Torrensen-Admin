<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0A0A0A">
<title>Torrensen · Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --red:#D42B2B; --red-d:#A01F1F; --red-glow:rgba(212,43,43,0.15);
  --bg:#0A0A0A; --bg2:#141414; --bg3:#1E1E1E; --bg4:#282828;
  --border:rgba(255,255,255,0.08); --border-red:rgba(212,43,43,0.3);
  --text:#F2F2F2; --muted:#888; --dim:#555;
  --green:#22C55E; --yellow:#D97706; --fluo:#BFFF00;
  --sidebar:252px;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --shadow: 0 8px 30px rgba(0,0,0,0.4);
}
html.light {
  --bg:#F8F9FA; --bg2:#FFFFFF; --bg3:#F1F3F5; --bg4:#E9ECEF;
  --border:rgba(0,0,0,0.1); --border-red:rgba(212,43,43,0.3);
  --text:#111; --muted:#666; --dim:#999;
  --red-glow:rgba(212,43,43,0.08);
  --shadow: 0 8px 30px rgba(0,0,0,0.06);
}
*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
html { height:100%; overscroll-behavior-y: none; }
body {
  font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text);
  height:100%; overflow-x:hidden; transition: background .3s, color .3s;
}

/* TOPBAR & SIDEBAR WITH NOTCH FIX */
#sidebar {
  width:var(--sidebar); background:var(--bg2); border-right:1px solid var(--border);
  position:fixed; top:0; left:0; bottom:0; z-index:100; overflow-y:auto;
  display:flex; flex-direction:column; padding-top: var(--safe-top); padding-bottom: var(--safe-bottom);
  transition:transform .3s cubic-bezier(0.2, 0.8, 0.2, 1);
}
#topbar {
  position:sticky; top:0; z-index:50;
  background:rgba(10,10,10,.85); backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border);
  padding: max(12px, var(--safe-top)) 20px 12px;
  display:flex; align-items:center; gap:12px;
}
html.light #topbar { background:rgba(248,249,250,.85); }

/* LAYOUT */
#main { margin-left:var(--sidebar); min-height:100dvh; display:flex; flex-direction:column; }
#content { padding:24px 20px calc(24px + var(--safe-bottom)); flex:1; }

/* SHARED UI */
.page-title { font-family:'Bebas Neue',cursive; font-size:36px; letter-spacing:0.5px; line-height:1; }
.page-title em { color:var(--red); font-style:normal; }
.search-box {
  flex:1; max-width:400px; height:38px; background:var(--bg3);
  border:1px solid var(--border); border-radius:10px;
  display:flex; align-items:center; gap:8px; padding:0 14px; transition:border-color .2s;
}
.search-box input { background:none; border:none; outline:none; color:var(--text); width:100%; font-family:'DM Sans'; font-size:13px; }
.theme-toggle {
  width:38px; height:38px; border-radius:10px; border:1px solid var(--border);
  background:none; color:var(--text); font-size:18px; cursor:pointer;
  display:flex; align-items:center; justify-content:center; transition:all .2s;
}
.theme-toggle:hover { border-color:var(--red); background:var(--red-glow); }

/* SIDEBAR NAV */
.sidebar-logo { padding:16px 20px; border-bottom:1px solid var(--border); }
.brand { font-family:'Bebas Neue',cursive; font-size:28px; letter-spacing:2px; line-height:1; }
.brand em { color:var(--red); font-style:normal; }
.nav-item {
  display:flex; align-items:center; gap:10px; padding:10px 20px;
  font-size:13px; font-weight:500; color:var(--muted); cursor:pointer;
  border-left:3px solid transparent; transition:all .2s;
}
.nav-item.active { color:var(--red); border-left-color:var(--red); background:var(--red-glow); }

/* MOBILE RESPONSIVE CARDS (Orders & Products) */
.mobile-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:14px; }
.m-card {
  background:var(--bg2); border:1px solid var(--border); border-radius:14px;
  padding:16px; display:flex; flex-direction:column; gap:12px;
  transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
  position:relative; overflow:hidden; user-select:none;
}
.m-card:active { transform: scale(0.98); }
.m-card.confirmed { border-color: rgba(34,197,94,0.3); background: rgba(34,197,94,0.03); }
.m-card.confirmed::before { content:''; position:absolute; left:0; top:0; bottom:0; width:4px; background:var(--green); }

/* BADGES */
.bdg { display:inline-flex; align-items:center; padding:4px 8px; border-radius:6px; font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:0.5px; }
.bdg-y { background:rgba(217,119,6,.15); color:#F59E0B; }
.bdg-g { background:rgba(34,197,94,.15); color:var(--green); }
.bdg-r { background:rgba(212,43,43,.15); color:#ff6060; }

/* MODALS & OVERLAYS */
.overlay {
  position:fixed; inset:0; z-index:900; background:rgba(0,0,0,.7); backdrop-filter:blur(5px);
  display:flex; align-items:center; justify-content:center; padding:20px;
  opacity:0; pointer-events:none; transition:opacity .3s;
}
.overlay.open { opacity:1; pointer-events:all; }
.modal {
  background:var(--bg2); border:1px solid var(--border); border-radius:18px; width:100%; max-width:500px;
  transform:translateY(30px) scale(0.95); transition:transform .3s cubic-bezier(0.2, 0.8, 0.2, 1);
  box-shadow: var(--shadow); max-height:85vh; overflow-y:auto;
}
.overlay.open .modal { transform:translateY(0) scale(1); }

/* TOAST FIX */
.toast {
  position:fixed; bottom:calc(20px + var(--safe-bottom)); left:50%;
  transform:translateX(-50%) translateY(100px); opacity:0; pointer-events:none;
  background:var(--bg2); border:1px solid var(--border); border-radius:12px;
  padding:12px 20px; font-size:13px; font-weight:600; display:flex; align-items:center; gap:10px;
  box-shadow: var(--shadow); z-index:999; transition:all .4s cubic-bezier(0.2, 0.8, 0.2, 1);
}
.toast.show { transform:translateX(-50%) translateY(0); opacity:1; }
.toast.err { border-color:var(--red); color:#ff6060; }

/* INPUTS & BUTTONS */
.btn-sm { padding:6px 14px; border-radius:8px; font-size:12px; font-weight:600; cursor:pointer; border:none; transition:0.2s; font-family:'DM Sans'; }
.btn-r { background:var(--red); color:#fff; }
.btn-r:active { background:var(--red-d); }
.btn-o { background:var(--bg3); border:1px solid var(--border); color:var(--text); }
.btn-g { background:rgba(34,197,94,.15); color:var(--green); border:1px solid rgba(34,197,94,.3); }

/* RESPONSIVE TOGGLE */
@media(max-width:768px) {
  #sidebar { transform:translateX(-100%); }
  #sidebar.open { transform:translateX(0); }
  #main { margin-left:0; }
  .menu-btn { display:flex; width:38px; height:38px; align-items:center; justify-content:center; border:1px solid var(--border); border-radius:10px; background:var(--bg2); color:var(--text); font-size:18px; }
}
</style>
</head>
<body>

<!-- LOADER -->
<div id="loader" style="position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:20px;">
  <div class="brand" style="font-size:44px">TOR<em>REN</em>SEN</div>
  <div style="width:160px;height:2px;background:var(--bg4);border-radius:1px;overflow:hidden;"><div style="height:100%;background:var(--red);animation:fill 1.4s ease forwards;"></div></div>
</div>

<!-- PIN -->
<div id="pin-screen" style="position:fixed;inset:0;background:var(--bg);z-index:1000;display:none;align-items:center;justify-content:center;flex-direction:column;padding-top:var(--safe-top);">
  <div style="text-align:center;margin-bottom:30px">
    <div class="brand" style="font-size:40px">TOR<em>REN</em>SEN</div>
    <div style="font-size:11px;color:var(--dim);letter-spacing:3px;margin-top:4px">ADMINISTRACIÓN</div>
  </div>
  <div style="font-family:'Bebas Neue';font-size:24px;margin-bottom:20px">PIN DE <em>ACCESO</em></div>
  <div style="display:flex;gap:12px;margin-bottom:30px" id="pin-dots">
    <div style="width:14px;height:14px;border-radius:50%;border:2px solid var(--border)"></div>
    <div style="width:14px;height:14px;border-radius:50%;border:2px solid var(--border)"></div>
    <div style="width:14px;height:14px;border-radius:50%;border:2px solid var(--border)"></div>
    <div style="width:14px;height:14px;border-radius:50%;border:2px solid var(--border)"></div>
    <div style="width:14px;height:14px;border-radius:50%;border:2px solid var(--border)"></div>
    <div style="width:14px;height:14px;border-radius:50%;border:2px solid var(--border)"></div>
  </div>
  <div style="display:grid;grid-template-columns:repeat(3,72px);gap:12px;">
    <button class="btn-o" style="height:56px;font-size:24px;font-family:'Bebas Neue'" onclick="pinKey('1')">1</button>
    <button class="btn-o" style="height:56px;font-size:24px;font-family:'Bebas Neue'" onclick="pinKey('2')">2</button>
    <button class="btn-o" style="height:56px;font-size:24px;font-family:'Bebas Neue'" onclick="pinKey('3')">3</button>
    <button class="btn-o" style="height:56px;font-size:24px;font-family:'Bebas Neue'" onclick="pinKey('4')">4</button>
    <button class="btn-o" style="height:56px;font-size:24px;font-family:'Bebas Neue'" onclick="pinKey('5')">5</button>
    <button class="btn-o" style="height:56px;font-size:24px;font-family:'Bebas Neue'" onclick="pinKey('6')">6</button>
    <button class="btn-o" style="height:56px;font-size:24px;font-family:'Bebas Neue'" onclick="pinKey('7')">7</button>
    <button class="btn-o" style="height:56px;font-size:24px;font-family:'Bebas Neue'" onclick="pinKey('8')">8</button>
    <button class="btn-o" style="height:56px;font-size:24px;font-family:'Bebas Neue'" onclick="pinKey('9')">9</button>
    <button class="btn-o" style="height:56px;font-size:12px;" onclick="pinClear()">C</button>
    <button class="btn-o" style="height:56px;font-size:24px;font-family:'Bebas Neue'" onclick="pinKey('0')">0</button>
    <button class="btn-o" style="height:56px;font-size:18px;" onclick="pinDel()">⌫</button>
  </div>
</div>

<!-- APP -->
<div id="app">
  <nav id="sidebar">
    <div class="sidebar-logo">
      <div class="brand">TOR<em>REN</em>SEN</div>
      <div style="font-size:9px;letter-spacing:3px;color:var(--dim);margin-top:4px">ADMIN</div>
    </div>
    <div style="padding:10px 0;flex:1" id="sidebar-nav">
      <div class="nav-item active" onclick="navAdmin('orders',this)"><span style="font-size:16px">📦</span> Pedidos <span id="pending-bdg" style="margin-left:auto;background:var(--red);color:#fff;font-size:10px;font-weight:700;padding:2px 6px;border-radius:10px;display:none">0</span></div>
      <div class="nav-item" onclick="navAdmin('stock',this)"><span style="font-size:16px">⚡</span> Catálogo Rápido</div>
    </div>
    <div style="padding:20px;border-top:1px solid var(--border);font-size:11px;color:var(--dim)">
      <div>Conectado en tiempo real</div>
      <button onclick="doLogout()" style="background:none;border:1px solid var(--border);border-radius:6px;color:var(--muted);padding:6px 12px;margin-top:10px;cursor:pointer;width:100%">Cerrar sesión</button>
    </div>
  </nav>

  <div id="main">
    <div id="topbar">
      <button class="menu-btn" onclick="toggleSidebar()">☰</button>
      <div class="search-box">
        <span>🔍</span>
        <input type="text" placeholder="Buscar..." id="search-inp" oninput="doSearch(this.value)">
      </div>
      <button class="theme-toggle" onclick="toggleTheme()">◑</button>
    </div>
    <div id="content"></div>
  </div>
</div>

<!-- ORDER DETAIL MODAL -->
<div class="overlay" id="order-detail-overlay" onclick="overlayClick(event,'order-detail-overlay')">
  <div class="modal">
    <div style="padding:20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center">
      <div>
        <div style="font-family:'Bebas Neue';font-size:24px;line-height:1" id="od-title">OP-000</div>
        <div style="font-size:11px;color:var(--muted);margin-top:4px" id="od-date"></div>
      </div>
      <button class="btn-o" style="width:32px;height:32px;padding:0;border-radius:50%" onclick="closeOverlay('order-detail-overlay')">✕</button>
    </div>
    <div id="od-body" style="padding:20px"></div>
    <div style="padding:16px 20px;border-top:1px solid var(--border);display:flex;justify-content:space-between;gap:10px" id="od-foot"></div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"><span id="t-ico">✓</span><span id="t-msg">OK</span></div>

<script>
// CONFIG
const SUPA_URL = 'https://zfqnvdhaqdgeruientrv.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpmcW52ZGhhcWRnZXJ1aWVudHJ2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzNDc1NzksImV4cCI6MjA4ODkyMzU3OX0.ATrHQzpkA-N3z2IXRazVmFW9AxjS1wjWA4kjKh6pvTE';
const ADMIN_PIN = '200622';
const ADMIN_EMAIL = 'distribuidoramercadolimpio@gmail.com';
const ADMIN_PASS = '200622';

const { createClient } = supabase;
const db = createClient(SUPA_URL, SUPA_KEY);

let allProds =[], adminOrders = [], adminProfiles =[];
let pinInput = '', currentSearch = '', currentSection = 'orders';

// THEME
function initTheme() { if(localStorage.getItem('torrensen_theme')==='light') document.documentElement.classList.add('light'); }
function toggleTheme() { document.documentElement.classList.toggle('light'); localStorage.setItem('torrensen_theme', document.documentElement.classList.contains('light')?'light':'dark'); }
initTheme();

// INIT
async function init() {
  if (localStorage.getItem('torrensen_admin_auth') === '1') {
    let { data: { session } } = await db.auth.getSession();
    if (!session) { const { error } = await db.auth.signInWithPassword({ email: ADMIN_EMAIL, password: ADMIN_PASS }); if(error){ showPinScreen(); return; } }
    await loadData(); setupRt(); enterApp(); return;
  }
  showPinScreen();
}

// PIN
function showPinScreen() { document.getElementById('loader').style.display = 'none'; document.getElementById('pin-screen').style.display = 'flex'; }
function pinKey(n) { if(pinInput.length>=6)return; pinInput+=n; updatePin(); if(pinInput.length===6) setTimeout(validatePin, 150); }
function pinDel() { pinInput=pinInput.slice(0,-1); updatePin(); }
function pinClear() { pinInput=''; updatePin(); }
function updatePin() { document.querySelectorAll('#pin-dots div').forEach((d,i) => { d.style.background = i<pinInput.length ? 'var(--red)' : 'none'; d.style.borderColor = i<pinInput.length ? 'var(--red)' : 'var(--border)'; }); }
async function validatePin() {
  if(pinInput===ADMIN_PIN) {
    await db.auth.signInWithPassword({ email: ADMIN_EMAIL, password: ADMIN_PASS });
    localStorage.setItem('torrensen_admin_auth','1');
    document.getElementById('pin-screen').style.display='none';
    await loadData(); setupRt(); enterApp();
  } else {
    pinInput=''; updatePin(); toast('PIN Incorrecto', true);
  }
}

// DATA & RT
async function loadData() {
  const[{data:prods}, {data:orders}, {data:profs}] = await Promise.all([
    db.from('products').select('*').order('sort_order'),
    db.from('orders').select('*').order('created_at', {ascending:false}),
    db.from('profiles').select('*')
  ]);
  allProds = prods||[]; adminProfiles = profs||[];
  adminOrders = (orders||[]).map(o=>({...o, profiles:adminProfiles.find(p=>p.id===o.user_id)}));
}

function setupRt() {
  db.channel('admin-sync')
  .on('postgres_changes',{event:'*',schema:'public',table:'products'}, async () => {
    const {data} = await db.from('products').select('*').order('sort_order'); allProds=data||[];
    if(currentSection==='stock') renderStock();
  })
  .on('postgres_changes',{event:'*',schema:'public',table:'orders'}, async () => {
    const {data} = await db.from('orders').select('*').order('created_at',{ascending:false});
    adminOrders = (data||[]).map(o=>({...o, profiles:adminProfiles.find(p=>p.id===o.user_id)}));
    if(currentSection==='orders') renderOrders(); updateBadges(); toast('📦 Pedido nuevo/actualizado');
  })
  .subscribe();
}

function updateBadges() {
  const p = adminOrders.filter(o=>o.status==='pending').length;
  const b = document.getElementById('pending-bdg');
  if(b) { b.style.display = p>0?'block':'none'; b.textContent=p; }
}

function enterApp() {
  document.getElementById('loader').style.display='none';
  document.getElementById('app').style.display='block';
  updateBadges(); navAdmin('orders', document.querySelector('.nav-item'));
}
async function doLogout() { localStorage.removeItem('torrensen_admin_auth'); await db.auth.signOut(); location.reload(); }

// ROUTING
function navAdmin(sec, el) {
  document.querySelectorAll('.nav-item').forEach(x=>x.classList.remove('active')); if(el) el.classList.add('active');
  currentSection = sec; currentSearch = ''; document.getElementById('search-inp').value = '';
  document.getElementById('sidebar').classList.remove('open');
  if(sec==='orders') renderOrders();
  if(sec==='stock') renderStock();
}
function doSearch(val) { currentSearch = val.toLowerCase(); currentSection==='orders'?renderOrders():renderStock(); }

// ═══════════════════════════════════════════════════════
// ORDERS VIEW
// ═══════════════════════════════════════════════════════
function renderOrders() {
  let list = [...adminOrders];
  if(currentSearch) list = list.filter(o=>o.order_number?.toLowerCase().includes(currentSearch) || o.profiles?.empresa?.toLowerCase().includes(currentSearch));
  
  // Sort: Pending first, then by date
  list.sort((a,b) => {
    if(a.status === 'pending' && b.status !== 'pending') return -1;
    if(a.status !== 'pending' && b.status === 'pending') return 1;
    return new Date(b.created_at) - new Date(a.created_at);
  });

  const sc = {pending:{l:'PENDIENTE',c:'bdg-y'}, confirmed:{l:'CONFIRMADO',c:'bdg-g'}, cancelled:{l:'CANCELADO',c:'bdg-r'}};
  
  document.getElementById('content').innerHTML = `
    <div style="margin-bottom:20px"><div class="page-title">GESTIÓN DE <em>PEDIDOS</em></div></div>
    <div class="mobile-grid">
      ${list.map(o=>{
        const s = sc[o.status] || {l:o.status, c:'bdg-y'};
        const isConf = o.status==='confirmed';
        return `
        <div class="m-card ${isConf?'confirmed':''}" 
             ontouchstart="tStart(event, '${o.id}')" ontouchmove="tMove()" ontouchend="tEnd(event, '${o.id}')"
             onmousedown="tStart(event, '${o.id}')" onmousemove="tMove()" onmouseup="tEnd(event, '${o.id}')" onmouseleave="tMove()">
          <div style="display:flex;justify-content:space-between;align-items:center">
            <div style="font-family:'Bebas Neue';font-size:20px;color:${isConf?'var(--green)':'var(--red)'}">${o.order_number||'OP-???'}</div>
            <div class="bdg ${s.c}">${s.l}</div>
          </div>
          <div>
            <div style="font-size:14px;font-weight:700">${o.profiles?.empresa||'Sin nombre'}</div>
            <div style="font-size:11px;color:var(--muted)">${new Date(o.created_at).toLocaleDateString()}</div>
          </div>
          <div style="display:flex;justify-content:space-between;align-items:end;margin-top:auto;padding-top:10px;border-top:1px solid var(--border)">
            <div style="font-family:'Bebas Neue';font-size:22px">USD ${Number(o.total_usd||0).toLocaleString()}</div>
            ${!isConf ? `<button class="btn-sm btn-g" onclick="event.stopPropagation(); setOrderStatus('${o.id}', 'confirmed', '${o.profiles?.empresa||''}', '${o.order_number||''}')">✓ Confirmar</button>` : `<span style="font-size:11px;color:var(--green)">✓ Gestionado</span>`}
          </div>
        </div>`;
      }).join('') || '<div style="color:var(--dim);grid-column:1/-1">No hay pedidos.</div>'}
    </div>
    <div style="font-size:11px;color:var(--dim);text-align:center;margin-top:20px">Mantén presionada una tarjeta 1.5s para eliminarla.</div>
  `;
}

// GESTURES FOR DELETION
let pTimer, isLp = false;
function tStart(e, id) { isLp=false; pTimer = setTimeout(()=>{ isLp=true; askDelOrder(id); }, 1200); }
function tMove() { clearTimeout(pTimer); }
function tEnd(e, id) { clearTimeout(pTimer); if(!isLp && e.cancelable!==false) openOrderDetail(id); }

function askDelOrder(id) {
  if(confirm('¿Eliminar este pedido permanentemente?')) {
    db.from('orders').delete().eq('id', id).then(({error})=>{
      if(error) toast('Error al eliminar', true); else { toast('Pedido eliminado'); adminOrders = adminOrders.filter(o=>o.id!==id); renderOrders(); updateBadges(); }
    });
  }
}

async function setOrderStatus(id, status, empresa, num) {
  const {error} = await db.from('orders').update({status}).eq('id', id);
  if(error){ toast('Error de base de datos',true); return; }
  
  const idx = adminOrders.findIndex(o=>o.id===id); if(idx>-1) adminOrders[idx].status = status;
  renderOrders(); updateBadges();
  
  // WhatsApp Notification logic
  if(status==='confirmed' && empresa) {
    const msg = `Hola ${empresa}, recibimos correctamente tu pedido ${num}. Pronto nos comunicaremos para coordinar la entrega y el pago. ¡Gracias! - Torrensen`;
    const url = `https://wa.me/?text=${encodeURIComponent(msg)}`;
    window.open(url, '_blank');
  } else { toast('Estado actualizado'); }
}

async function openOrderDetail(id) {
  const o = adminOrders.find(x=>x.id===id); if(!o) return;
  const {data:items} = await db.from('order_items').select('*').eq('order_id', id);
  document.getElementById('od-title').textContent = o.order_number;
  document.getElementById('od-date').textContent = new Date(o.created_at).toLocaleString();
  
  document.getElementById('od-body').innerHTML = `
    <div style="background:var(--bg3);padding:14px;border-radius:10px;margin-bottom:16px">
      <div style="font-size:10px;color:var(--dim);text-transform:uppercase;margin-bottom:4px">Cliente</div>
      <div style="font-weight:700">${o.profiles?.empresa}</div>
      <div style="font-size:12px;color:var(--muted)">${o.profiles?.nombre} | CUIT: ${o.profiles?.cuit}</div>
    </div>
    <div style="display:flex;flex-direction:column;gap:8px">
      ${(items||[]).map(i=>`
        <div style="display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px dashed var(--border)">
          <div>
            <div style="font-size:13px;font-weight:600">${i.product_name}</div>
            <div style="font-size:11px;color:var(--muted)">${i.quantity}u x USD ${i.unit_price}</div>
          </div>
          <div style="font-family:'Bebas Neue';font-size:18px">USD ${i.subtotal}</div>
        </div>
      `).join('')}
    </div>
    <div style="text-align:right;font-family:'Bebas Neue';font-size:28px;margin-top:16px;color:var(--red)">TOTAL: USD ${o.total_usd}</div>
  `;
  
  document.getElementById('od-foot').innerHTML = `
    <button class="btn-sm btn-o" style="color:#ff6060" onclick="setOrderStatus('${id}','cancelled'); closeOverlay('order-detail-overlay')">✕ Cancelar Pedido</button>
    ${o.status==='pending' ? `<button class="btn-sm btn-r" onclick="setOrderStatus('${id}','confirmed','${o.profiles?.empresa}','${o.order_number}'); closeOverlay('order-detail-overlay')">✓ Confirmar y Avisar</button>` : ''}
  `;
  document.getElementById('order-detail-overlay').classList.add('open');
}

// ═══════════════════════════════════════════════════════
// UNIFIED STOCK & PRICES VIEW (MOBILE FRIENDLY)
// ═══════════════════════════════════════════════════════
function renderStock() {
  let list = [...allProds];
  if(currentSearch) list = list.filter(p=>p.name.toLowerCase().includes(currentSearch) || p.brand?.toLowerCase().includes(currentSearch));

  document.getElementById('content').innerHTML = `
    <div style="margin-bottom:20px"><div class="page-title">CATÁLOGO <em>RÁPIDO</em></div><div style="font-size:11px;color:var(--dim)">Actualiza stock y precios al instante</div></div>
    <div class="mobile-grid">
      ${list.map(p=>`
        <div class="m-card">
          <div style="display:flex;gap:12px;align-items:center;margin-bottom:8px">
            <div style="font-size:32px;background:var(--bg3);width:50px;height:50px;display:flex;align-items:center;justify-content:center;border-radius:10px">${p.icon_emoji||'📦'}</div>
            <div style="flex:1">
              <div style="font-weight:700;font-size:14px;line-height:1.2">${p.name}</div>
              <div style="font-size:10px;color:var(--dim);text-transform:uppercase;margin-top:4px">${p.brand_name}</div>
            </div>
            <label style="position:relative;width:40px;height:22px;display:inline-block">
              <input type="checkbox" style="opacity:0;width:0;height:0" ${p.active?'checked':''} onchange="toggleProd('${p.id}', this.checked)">
              <span style="position:absolute;inset:0;background:${p.active?'var(--green)':'var(--bg4)'};border-radius:12px;transition:.3s;cursor:pointer">
                <span style="position:absolute;left:3px;bottom:3px;width:16px;height:16px;background:#fff;border-radius:50%;transition:.3s;transform:${p.active?'translateX(18px)':'none'}"></span>
              </span>
            </label>
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;background:var(--bg3);padding:10px;border-radius:10px">
            <div>
              <div style="font-size:10px;color:var(--dim);margin-bottom:4px">STOCK ACTUAL</div>
              <input type="number" id="stk-${p.id}" value="${p.stock}" style="width:100%;background:var(--bg2);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:6px;font-family:'DM Sans';font-size:14px;font-weight:600" onblur="saveQuick('${p.id}')">
            </div>
            <div>
              <div style="font-size:10px;color:var(--dim);margin-bottom:4px">PRECIO MAYORISTA (x5)</div>
              <input type="number" id="prc-${p.id}" value="${p.price_x5||''}" style="width:100%;background:var(--bg2);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:6px;font-family:'DM Sans';font-size:14px;font-weight:600" onblur="saveQuick('${p.id}')">
            </div>
          </div>
        </div>
      `).join('')}
    </div>
  `;
}

async function saveQuick(id) {
  const stk = parseInt(document.getElementById(`stk-${id}`).value);
  const prc = parseFloat(document.getElementById(`prc-${id}`).value);
  if(isNaN(stk) || isNaN(prc)) return;
  
  const {error} = await db.from('products').update({stock: stk, price_x5: prc}).eq('id', id);
  if(error) { toast('Error de permisos en BD', true); console.error(error); return; }
  
  const idx = allProds.findIndex(p=>p.id===id);
  if(idx>-1) { allProds[idx].stock = stk; allProds[idx].price_x5 = prc; }
  toast('Actualizado ✓');
}

async function toggleProd(id, activeStatus) {
  const {error} = await db.from('products').update({active: activeStatus}).eq('id', id);
  if(error) { toast('Error al pausar', true); return; }
  toast(activeStatus ? 'Producto Activo' : 'Producto Pausado');
}

// UTILS
function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }
function overlayClick(e,id) { if(e.target.id===id) closeOverlay(id); }
function closeOverlay(id) { document.getElementById(id).classList.remove('open'); }
let tTimer;
function toast(msg, err=false) {
  const t = document.getElementById('toast');
  document.getElementById('t-msg').textContent = msg;
  t.className = `toast show ${err?'err':''}`;
  clearTimeout(tTimer); tTimer = setTimeout(()=>t.classList.remove('show'), 3000);
}

init();
</script>
