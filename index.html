<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0D0D0D">
<title>Torrensen · Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --red:#D42B2B; --red-d:#A01F1F; --red-glow:rgba(212,43,43,0.12);
  --bg:#0A0A0A; --bg2:#111; --bg3:#181818; --bg4:#1E1E1E; --bg5:#242424;
  --border:rgba(255,255,255,0.06); --border-m:rgba(255,255,255,0.1); --border-red:rgba(212,43,43,0.35);
  --text:#F2F2F2; --muted:#777; --dim:#444;
  --green:#22C55E; --yellow:#D97706; --fluo:#BFFF00;
  --sidebar:252px;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --card-shadow:0 2px 12px rgba(0,0,0,.3);
}
html.light {
  --bg:#F5F5F5; --bg2:#FFFFFF; --bg3:#ECECEC; --bg4:#E0E0E0; --bg5:#D4D4D4;
  --border:rgba(0,0,0,0.08); --border-m:rgba(0,0,0,0.12); --border-red:rgba(212,43,43,0.3);
  --text:#1A1A1A; --muted:#666; --dim:#999;
  --red-glow:rgba(212,43,43,0.08);
  --card-shadow:0 2px 12px rgba(0,0,0,.07);
}
html.light { color-scheme:light; }
html.light .loader-logo { color:var(--text); }
html.light .brand { color:var(--text); }
html.light #topbar { background:rgba(245,245,245,.94); }
html.light .toast { background:var(--bg2); }
html.light .stock-grid-card { box-shadow:var(--card-shadow); }

*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
html { height:100%; }
body {
  font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text);
  height:100%; min-height:100dvh; overflow-x:hidden;
  -webkit-font-smoothing:antialiased; transition:background .3s, color .3s;
}

.theme-toggle {
  width:36px; height:36px; border-radius:8px; border:1px solid var(--border);
  background:none; color:var(--muted); font-size:16px; cursor:pointer;
  display:flex; align-items:center; justify-content:center; transition:all .15s; flex-shrink:0;
}
.theme-toggle:hover { border-color:var(--red); color:var(--text); }

/* LOADER */
#loader {
  position:fixed; inset:0; background:var(--bg); z-index:9999;
  display:flex; align-items:center; justify-content:center; flex-direction:column; gap:20px;
}
.loader-logo { font-family:'Bebas Neue',cursive; font-size:44px; letter-spacing:5px; }
.loader-logo em { color:var(--red); font-style:normal; }
.loader-track { width:160px; height:2px; background:var(--bg4); border-radius:1px; overflow:hidden; }
.loader-fill { height:100%; background:var(--red); border-radius:1px; animation:fill 1.4s ease forwards; }
@keyframes fill { from{width:0} to{width:100%} }

/* PIN SCREEN */
#pin-screen {
  position:fixed; inset:0; z-index:1000;
  display:none; align-items:center; justify-content:center;
  background:var(--bg); flex-direction:column;
  padding:max(16px, var(--safe-top)) 16px max(16px, var(--safe-bottom));
}
.pin-wrap {
  width:100%; max-width:320px;
  display:flex; flex-direction:column; align-items:center; gap:20px;
}
.pin-logo {
  text-align:center; font-family:'Bebas Neue',cursive;
  font-size:36px; letter-spacing:5px; line-height:1;
}
.pin-logo em { color:var(--red); font-style:normal; }
.pin-logo small {
  display:block; font-family:'DM Sans',sans-serif;
  font-size:9px; letter-spacing:3px; text-transform:uppercase;
  color:var(--dim); margin-top:5px;
}
.pin-title { font-family:'Bebas Neue',cursive; font-size:28px; letter-spacing:1px; text-align:center; }
.pin-title em { color:var(--red); font-style:normal; }
.pin-dots { display:flex; gap:10px; }
.pin-dot {
  width:14px; height:14px; border-radius:50%;
  border:2px solid var(--border-m); background:none;
  transition:all .15s;
}
.pin-dot.filled { background:var(--red); border-color:var(--red); }
.pin-dot.err { border-color:#ff4444; background:#ff4444; animation:shake .4s; }
@keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-6px)} 40%{transform:translateX(6px)} 60%{transform:translateX(-4px)} 80%{transform:translateX(4px)} }
.pin-pad {
  display:grid; grid-template-columns:repeat(3,72px); gap:10px;
  justify-content:center;
}
.pin-key {
  width:72px; height:56px; border-radius:10px;
  border:1px solid var(--border); background:var(--bg2);
  color:var(--text); font-family:'Bebas Neue',cursive;
  font-size:24px; cursor:pointer; transition:all .12s;
  display:flex; align-items:center; justify-content:center;
}
.pin-key:hover { border-color:var(--red); background:var(--red-glow); }
.pin-key:active { transform:scale(.93); background:var(--red); color:#fff; }
.pin-key.fn { font-size:14px; font-family:'DM Sans',sans-serif; color:var(--muted); }

/* APP LAYOUT */
#app { display:none; min-height:100dvh; }
#sidebar {
  width:var(--sidebar); background:var(--bg2); border-right:1px solid var(--border);
  position:fixed; top:0; left:0; bottom:0; z-index:100; overflow-y:auto;
  display:flex; flex-direction:column;
  transition:transform .26s cubic-bezier(.32,.72,0,1);
}
.sidebar-logo { padding:24px 20px 16px; border-bottom:1px solid var(--border); }
.sidebar-logo .brand { font-family:'Bebas Neue',cursive; font-size:26px; letter-spacing:2px; line-height:1; }
.sidebar-logo .brand em { color:var(--red); font-style:normal; }
.sidebar-logo .sub { font-size:9px; letter-spacing:3px; color:var(--dim); text-transform:uppercase; margin-top:3px; }
.nav-sect { font-size:9px; letter-spacing:3px; text-transform:uppercase; color:var(--dim); padding:14px 20px 5px; }
.nav-item {
  display:flex; align-items:center; gap:9px; padding:8px 20px;
  font-size:12px; font-weight:500; color:var(--muted); cursor:pointer;
  border-left:2px solid transparent; transition:all .15s;
}
.nav-item:hover { color:var(--text); background:rgba(255,255,255,.02); }
html.light .nav-item:hover { background:rgba(0,0,0,.03); }
.nav-item.active { color:var(--red); border-left-color:var(--red); background:var(--red-glow); }
.nav-ico { width:15px; text-align:center; font-size:13px; }
.sidebar-foot {
  padding:14px 20px; border-top:1px solid var(--border);
  margin-top:auto; font-size:11px; color:var(--dim); line-height:1.7;
}
.sidebar-foot .emp { font-size:12px; font-weight:600; color:var(--text); }
.btn-logout {
  margin-top:8px; background:none; border:1px solid var(--border);
  border-radius:4px; color:var(--muted); font-size:10px;
  padding:4px 10px; cursor:pointer; font-family:'DM Sans',sans-serif;
}
.btn-logout:hover { border-color:var(--red); color:var(--red); }

#main { margin-left:var(--sidebar); min-height:100dvh; display:flex; flex-direction:column; }
#topbar {
  position:sticky; top:0; z-index:50;
  background:rgba(10,10,10,.94); backdrop-filter:blur(14px) saturate(1.4);
  border-bottom:1px solid var(--border);
  height:54px; display:flex; align-items:center; gap:10px; padding:0 20px;
}
html.light #topbar { background:rgba(245,245,245,.94); }
.menu-btn {
  display:none; width:36px; height:36px; border:1px solid var(--border);
  border-radius:7px; background:none; color:var(--text); font-size:17px; cursor:pointer;
  align-items:center; justify-content:center; flex-shrink:0;
}
.search-box {
  flex:1; max-width:380px; height:34px; background:var(--bg3);
  border:1px solid var(--border); border-radius:8px;
  display:flex; align-items:center; gap:8px; padding:0 12px;
  transition:border-color .15s;
}
.search-box:focus-within { border-color:rgba(212,43,43,.4); }
.search-box input {
  background:none; border:none; outline:none; color:var(--text);
  font-family:'DM Sans',sans-serif; font-size:12px; width:100%;
}
.search-box input::placeholder { color:var(--dim); }
.topbar-right { display:flex; align-items:center; gap:8px; margin-left:auto; }

#content { padding:24px 20px; flex:1; }
.page-hdr { display:flex; align-items:flex-end; justify-content:space-between; margin-bottom:18px; flex-wrap:wrap; gap:10px; }
.page-title { font-family:'Bebas Neue',cursive; font-size:36px; letter-spacing:.5px; line-height:1; }
.page-title em { color:var(--red); font-style:normal; }
.page-sub { font-size:11px; color:var(--dim); margin-top:2px; }

/* STOCK DASHBOARD */
.stock-dashboard { display:flex; flex-direction:column; gap:16px; }
.stock-summary {
  display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:10px;
}
.stock-summary-card {
  background:var(--bg2); border:1px solid var(--border); border-radius:10px;
  padding:16px; text-align:center; transition:all .15s;
}
.stock-summary-card.alert { border-color:var(--border-red); background:var(--red-glow); }
.ssc-val { font-family:'Bebas Neue',cursive; font-size:32px; line-height:1; }
.ssc-lbl { font-size:9px; letter-spacing:1.5px; text-transform:uppercase; color:var(--dim); margin-top:4px; }

.stock-grid {
  display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:10px;
}
.stock-grid-card {
  background:var(--bg2); border:1px solid var(--border); border-radius:10px;
  padding:14px; display:flex; flex-direction:column; gap:8px;
  transition:all .15s; position:relative; overflow:hidden;
}
.stock-grid-card::before {
  content:''; position:absolute; top:0; left:0; right:0; height:3px;
}
.stock-grid-card.ok::before { background:var(--fluo); }
.stock-grid-card.low::before { background:var(--yellow); }
.stock-grid-card.out::before { background:var(--red); }
.sgc-top { display:flex; align-items:center; gap:8px; }
.sgc-ico { font-size:22px; flex-shrink:0; }
.sgc-info { flex:1; min-width:0; }
.sgc-name { font-family:'Bebas Neue',cursive; font-size:17px; line-height:1.1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.sgc-brand { font-size:9px; color:var(--dim); text-transform:uppercase; letter-spacing:1px; }
.sgc-stock {
  display:flex; align-items:center; justify-content:space-between; gap:8px;
  padding:8px 10px; background:var(--bg3); border-radius:7px;
}
.sgc-qty { font-family:'Bebas Neue',cursive; font-size:28px; line-height:1; }
.sgc-qty.ok { color:var(--fluo); }
.sgc-qty.low { color:var(--yellow); }
.sgc-qty.out { color:var(--red); }
.sgc-bar { flex:1; height:4px; background:var(--bg5); border-radius:2px; overflow:hidden; }
.sgc-bar-fill { height:100%; border-radius:2px; transition:width .5s; }
.sgc-bar-fill.ok { background:var(--fluo); }
.sgc-bar-fill.low { background:var(--yellow); }
.sgc-bar-fill.out { background:var(--red); }
.sgc-edit { display:flex; align-items:center; gap:4px; }
.sgc-edit input {
  width:56px; height:28px; background:var(--bg4); border:1px solid var(--border);
  border-radius:5px; color:var(--text); font-size:12px; text-align:center;
  font-family:'DM Sans',sans-serif; outline:none;
}
.sgc-edit input:focus { border-color:var(--red); }
.sgc-edit button {
  width:28px; height:28px; border-radius:5px; border:none;
  background:var(--green); color:#000; font-size:12px; font-weight:700;
  cursor:pointer; display:flex; align-items:center; justify-content:center;
}
.sgc-edit button:hover { opacity:.85; }

/* ADMIN TABLES */
.stat-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(170px,1fr)); gap:12px; margin-bottom:22px; }
.stat-box { background:var(--bg2); border:1px solid var(--border); border-radius:9px; padding:16px; }
.stat-box.hi { border-color:var(--border-red); background:var(--red-glow); }
.stat-ico { font-size:18px; margin-bottom:4px; }
.stat-lbl { font-size:9px; letter-spacing:1.5px; text-transform:uppercase; color:var(--dim); }
.stat-val { font-family:'Bebas Neue',cursive; font-size:28px; line-height:1; margin-top:2px; }
.tbl-wrap { background:var(--bg2); border:1px solid var(--border); border-radius:9px; overflow:hidden; margin-bottom:16px; }
.tbl-hdr { padding:13px 18px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:8px; }
.tbl-title { font-family:'Bebas Neue',cursive; font-size:17px; letter-spacing:.3px; }
table.dt { width:100%; border-collapse:collapse; }
table.dt th {
  padding:9px 14px; font-size:9px; font-weight:700; letter-spacing:2px;
  text-transform:uppercase; color:var(--dim); text-align:left;
  background:var(--bg3); border-bottom:1px solid var(--border);
}
table.dt td { padding:11px 14px; font-size:12px; border-bottom:1px solid rgba(255,255,255,.025); vertical-align:middle; }
html.light table.dt td { border-bottom:1px solid rgba(0,0,0,.04); }
table.dt tr:last-child td { border-bottom:none; }
table.dt tr:hover td { background:rgba(255,255,255,.012); }
html.light table.dt tr:hover td { background:rgba(0,0,0,.02); }
.bdg {
  display:inline-flex; align-items:center; padding:2px 8px; border-radius:4px;
  font-size:9px; font-weight:700; letter-spacing:.5px; text-transform:uppercase;
}
.bdg-g { background:rgba(34,197,94,.1); color:var(--green); border:1px solid rgba(34,197,94,.2); }
.bdg-y { background:rgba(217,119,6,.1); color:#F59E0B; border:1px solid rgba(217,119,6,.2); }
.bdg-r { background:rgba(212,43,43,.1); color:#ff6060; border:1px solid rgba(212,43,43,.2); }
.bdg-b { background:rgba(59,130,246,.1); color:#60a5fa; border:1px solid rgba(59,130,246,.2); }
.ie-input {
  background:var(--bg3); border:1px solid var(--border); border-radius:4px;
  color:var(--text); font-size:11px; padding:3px 7px; width:72px;
  font-family:'DM Sans',sans-serif; outline:none;
}
.ie-input:focus { border-color:var(--red); }
.ie-btn {
  width:26px; height:26px; border-radius:4px; border:1px solid var(--border);
  background:none; color:var(--muted); font-size:11px; cursor:pointer;
  display:flex; align-items:center; justify-content:center; transition:all .13s;
}
.ie-btn:hover { border-color:var(--red); color:var(--red); }
.ie-btn.sv { background:var(--green); border-color:var(--green); color:#000; }
.btn-sm {
  height:28px; padding:0 12px; border-radius:6px;
  font-size:11px; font-weight:600; cursor:pointer; font-family:'DM Sans',sans-serif;
}
.btn-sm-o { background:none; border:1px solid var(--border); color:var(--muted); }
.btn-sm-o:hover { border-color:var(--red); color:var(--text); }
.btn-sm-r { background:var(--red); border:none; color:#fff; }
.btn-sm-r:hover { background:var(--red-d); }
.toggle-sw { position:relative; width:34px; height:18px; }
.toggle-sw input { opacity:0; width:0; height:0; }
.ts-track { position:absolute; cursor:pointer; inset:0; background:var(--bg5); border-radius:9px; border:1px solid var(--border); transition:.18s; }
.toggle-sw input:checked + .ts-track { background:var(--red); border-color:var(--red); }
.ts-track:before { position:absolute; content:""; height:12px; width:12px; left:2px; bottom:2px; background:#fff; border-radius:50%; transition:.18s; }
.toggle-sw input:checked + .ts-track:before { transform:translateX(16px); }

.form-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.form-full { grid-column:1/-1; }
.form-lbl { font-size:9px; font-weight:700; letter-spacing:1px; text-transform:uppercase; color:var(--dim); margin-bottom:4px; display:block; }
.finput {
  height:38px; background:var(--bg4); border:1px solid var(--border);
  border-radius:7px; color:var(--text); font-size:13px;
  padding:0 12px; font-family:'DM Sans',sans-serif; outline:none;
  transition:border-color .15s;
}
.finput:focus { border-color:var(--red); }
.finput::placeholder { color:var(--dim); }
.form-sel {
  height:38px; background:var(--bg3); border:1px solid var(--border);
  border-radius:6px; color:var(--text); font-size:12px; padding:0 10px;
  font-family:'DM Sans',sans-serif; outline:none; width:100%; cursor:pointer;
}
.form-sel:focus { border-color:var(--red); }
.form-ta {
  background:var(--bg3); border:1px solid var(--border); border-radius:6px;
  color:var(--text); font-size:12px; padding:8px 10px;
  font-family:'DM Sans',sans-serif; outline:none; resize:vertical;
  min-height:70px; width:100%; transition:border-color .15s;
}
.form-ta:focus { border-color:var(--red); }

/* OVERLAY / MODAL */
.overlay {
  position:fixed; inset:0; z-index:200;
  background:rgba(0,0,0,.82); backdrop-filter:blur(8px);
  display:flex; align-items:center; justify-content:center; padding:20px;
  opacity:0; pointer-events:none; transition:opacity .2s;
}
.overlay.open { opacity:1; pointer-events:all; }
.modal {
  background:var(--bg2); border:1px solid var(--border);
  border-radius:14px; width:100%; max-width:680px;
  max-height:88vh; overflow-y:auto;
  transform:translateY(18px) scale(.98);
  transition:transform .22s cubic-bezier(.32,.72,0,1);
}
.overlay.open .modal { transform:translateY(0) scale(1); }
.modal-hdr {
  padding:22px 26px 0; display:flex; align-items:flex-start;
  justify-content:space-between; gap:14px;
}
.modal-ttl { font-family:'Bebas Neue',cursive; font-size:32px; line-height:1; }
.btn-x {
  width:32px; height:32px; border:1px solid var(--border); border-radius:6px;
  background:none; color:var(--muted); font-size:16px; cursor:pointer;
  display:flex; align-items:center; justify-content:center; flex-shrink:0;
}
.btn-x:hover { border-color:var(--red); color:var(--red); }
.modal-body { padding:18px 26px 26px; }

/* TOAST */
.toast {
  position:fixed; bottom:calc(20px + var(--safe-bottom)); left:50%;
  transform:translateX(-50%) translateY(70px);
  background:var(--bg3); border:1px solid var(--border);
  border-radius:8px; padding:11px 18px;
  font-size:12px; display:flex; align-items:center; gap:8px;
  box-shadow:0 6px 24px rgba(0,0,0,.4); z-index:600;
  transition:transform .28s cubic-bezier(.32,.72,0,1);
  white-space:nowrap; max-width:88vw;
}
.toast.show { transform:translateX(-50%) translateY(0); }
.toast.err { border-color:var(--border-red); }

.hidden { display:none!important; }

/* RESPONSIVE */
@media(max-width:768px) {
  #sidebar { transform:translateX(-100%); }
  #sidebar.open { transform:translateX(0); }
  #sidebar.open ~ #main::before {
    content:''; position:fixed; inset:0; z-index:99;
    background:rgba(0,0,0,.5); animation:fadeIn .2s ease;
  }
  @keyframes fadeIn { from{opacity:0} to{opacity:1} }
  #main { margin-left:0; }
  .menu-btn { display:flex; }
  #content { padding:16px 14px; }
  .page-title { font-size:28px; }
  .stock-grid { grid-template-columns:repeat(auto-fill,minmax(160px,1fr)); }
}
</style>
</head>
<body>

<!-- LOADER -->
<div id="loader">
  <div class="loader-logo">TOR<em>REN</em>SEN</div>
  <div class="loader-track"><div class="loader-fill"></div></div>
</div>

<!-- PIN SCREEN -->
<div id="pin-screen">
  <div class="pin-wrap">
    <div class="pin-logo">
      TOR<em>REN</em>SEN
      <small>Acceso Administración</small>
    </div>
    <div class="pin-title">Ingresá tu <em>PIN</em></div>
    <div class="pin-dots" id="pin-dots">
      <div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div>
      <div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div>
    </div>
    <div class="pin-pad">
      <button class="pin-key" onclick="pinKey('1')">1</button>
      <button class="pin-key" onclick="pinKey('2')">2</button>
      <button class="pin-key" onclick="pinKey('3')">3</button>
      <button class="pin-key" onclick="pinKey('4')">4</button>
      <button class="pin-key" onclick="pinKey('5')">5</button>
      <button class="pin-key" onclick="pinKey('6')">6</button>
      <button class="pin-key" onclick="pinKey('7')">7</button>
      <button class="pin-key" onclick="pinKey('8')">8</button>
      <button class="pin-key" onclick="pinKey('9')">9</button>
      <button class="pin-key fn" onclick="pinClear()">Borrar</button>
      <button class="pin-key" onclick="pinKey('0')">0</button>
      <button class="pin-key fn" onclick="pinDel()">⌫</button>
    </div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <nav id="sidebar">
    <div class="sidebar-logo">
      <div class="brand">TOR<em>REN</em>SEN</div>
      <div class="sub">Administración</div>
    </div>

<!-- TOAST -->
<div class="toast" id="toast"><span id="t-ico">✓</span><span id="t-msg">OK</span></div>

<script>
// ═══════════════════════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════════════════════
const SUPA_URL = 'https://zfqnvdhaqdgeruientrv.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpmcW52ZGhhcWRnZXJ1aWVudHJ2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzNDc1NzksImV4cCI6MjA4ODkyMzU3OX0.ATrHQzpkA-N3z2IXRazVmFW9AxjS1wjWA4kjKh6pvTE';
const ADMIN_PIN = '200622';
const ADMIN_EMAIL = 'distribuidoramercadolimpio@gmail.com';
const ADMIN_PASS = '200622';

const { createClient } = supabase;
const db = createClient(SUPA_URL, SUPA_KEY);

// STATE
let allProds = [];
let adminOrders = [], adminProfiles = [];
let editingProdId = null;
let pinInput = '';
let adminStockSearch = '';
let rtSetupDone = false;

// THEME
function initTheme() {
  const saved = localStorage.getItem('torrensen_theme');
  if (saved === 'light') document.documentElement.classList.add('light');
}
function toggleTheme() {
  document.documentElement.classList.toggle('light');
  localStorage.setItem('torrensen_theme', document.documentElement.classList.contains('light') ? 'light' : 'dark');
}
initTheme();

// ═══════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════
async function init() {
  if (localStorage.getItem('torrensen_admin_auth') === '1') {
    let { data: { session } } = await db.auth.getSession();
    if (!session) {
      const { error } = await db.auth.signInWithPassword({ email: ADMIN_EMAIL, password: ADMIN_PASS });
      if (error) { showPinScreen(); return; }
    }
    await loadProds();
    setupRt();
    await loadAdminData();
    enterApp();
    return;
  }
  showPinScreen();
}

function showPinScreen() {
  document.getElementById('loader').style.display = 'none';
  document.getElementById('pin-screen').style.display = 'flex';
  pinInput = '';
  updatePinDots();
}

// ═══════════════════════════════════════════════════════
// PIN
// ═══════════════════════════════════════════════════════
function pinKey(n) {
  if (pinInput.length >= 6) return;
  pinInput += n;
  updatePinDots();
  if (pinInput.length === 6) setTimeout(() => validatePin(), 150);
}
function pinDel() { pinInput = pinInput.slice(0, -1); updatePinDots(); }
function pinClear() { pinInput = ''; updatePinDots(); }
function updatePinDots() {
  const dots = document.querySelectorAll('#pin-dots .pin-dot');
  dots.forEach((d, i) => { d.classList.toggle('filled', i < pinInput.length); d.classList.remove('err'); });
}
async function validatePin() {
  if (pinInput === ADMIN_PIN) {
    const { error } = await db.auth.signInWithPassword({ email: ADMIN_EMAIL, password: ADMIN_PASS });
    if (error) { console.error('Admin auth error:', error.message); toast('Error de autenticación', true); pinInput = ''; updatePinDots(); return; }
    localStorage.setItem('torrensen_admin_auth', '1');
    document.getElementById('pin-screen').style.display = 'none';
    await loadProds(); setupRt(); await loadAdminData(); enterApp();
  } else {
    document.querySelectorAll('#pin-dots .pin-dot').forEach(d => d.classList.add('err'));
    setTimeout(() => { pinInput = ''; updatePinDots(); }, 500);
  }
}

// ═══════════════════════════════════════════════════════
// ENTER APP
// ═══════════════════════════════════════════════════════
function enterApp() {
  document.getElementById('loader').style.display='none';
  document.getElementById('pin-screen').style.display='none';
  document.getElementById('app').style.display='block';

  document.getElementById('sidebar-nav').innerHTML=`
    <div class="nav-sect">Principal</div>
    <div class="nav-item active" onclick="navAdmin('stock-live',this)"><span class="nav-ico">📊</span> Stock en vivo</div>
    <div class="nav-sect">Gestión</div>
    <div class="nav-item" onclick="navAdmin('orders',this)"><span class="nav-ico">📋</span> Pedidos <span id="pending-bdg" style="margin-left:auto;background:var(--red);color:#fff;font-size:9px;font-weight:700;min-width:16px;height:16px;border-radius:8px;display:none;align-items:center;justify-content:center;padding:0 3px">0</span></div>
    <div class="nav-item" onclick="navAdmin('prices',this)"><span class="nav-ico">💲</span> Precios</div>
    <div class="nav-item" onclick="navAdmin('products',this)"><span class="nav-ico">⚙</span> Productos</div>
    <div class="nav-item" onclick="navAdmin('dash',this)"><span class="nav-ico">📈</span> Resumen</div>
  `;

  document.getElementById('side-foot').innerHTML=`
    <div class="emp">Torrensen Admin</div>
    <div style="margin-top:4px;font-size:10px"><span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--fluo);margin-right:3px;animation:blink 2.2s infinite"></span><span style="color:var(--fluo)">Tiempo real activo</span></div>
    <button class="btn-logout" onclick="doLogout()">Cerrar sesión</button>
  `;

  const pend=adminOrders.filter(o=>o.status==='pending').length;
  const bdg=document.getElementById('pending-bdg');
  if(bdg){bdg.style.display=pend>0?'flex':'none';bdg.textContent=pend;}

  renderAdminStockLive();
}

async function doLogout() {
  db.getChannels().forEach(c => db.removeChannel(c));
  rtSetupDone = false;
  localStorage.removeItem('torrensen_admin_auth');
  await db.auth.signOut();
  location.reload();
}

// ═══════════════════════════════════════════════════════
// PRODUCTS
// ═══════════════════════════════════════════════════════
async function loadProds() {
  const{data}=await db.from('products').select('*').order('sort_order');
  allProds=data||[];
}

function setupRt() {
  if (rtSetupDone) return;
  rtSetupDone = true;
  db.getChannels().forEach(c => db.removeChannel(c));

  db.channel('rt-prods-admin')
    .on('postgres_changes',{event:'*',schema:'public',table:'products'}, p => {
      const prod = p.new;
      const evt = p.eventType;
      if (evt === 'INSERT') { if (!allProds.find(x=>x.id===prod.id)) allProds.push(prod); }
      else if (evt === 'UPDATE') { const i=allProds.findIndex(x=>x.id===prod.id); if(i!==-1) allProds[i]={...allProds[i],...prod}; else allProds.push(prod); }
      else if (evt === 'DELETE') { allProds=allProds.filter(x=>x.id!==(p.old?.id||prod?.id)); }
      const sect=document.getElementById('content').dataset?.section;
      if(sect==='stock-live') renderAdminStockLive();
      else if(sect==='products') renderAdminProducts();
      else if(sect==='prices') renderAdminPrices();
      else if(sect==='dash') renderAdminDash();
    })
    .subscribe();

  db.channel('rt-orders-admin')
    .on('postgres_changes',{event:'*',schema:'public',table:'orders'}, async () => {
      await loadAdminData();
      const sect=document.getElementById('content').dataset?.section;
      if(sect==='orders') renderAdminOrders();
      if(sect==='dash') renderAdminDash();
      toast('📦 Pedido actualizado');
    })
    .subscribe();
}

function ss(stock){if(stock===0)return'out';if(stock<=3)return'low';return'ok';}

// ═══════════════════════════════════════════════════════
// ADMIN DATA
// ═══════════════════════════════════════════════════════
async function loadAdminData(){
  const[{data:orders},{data:profiles}]=await Promise.all([
    db.from('orders').select('*').order('created_at',{ascending:false}),
    db.from('profiles').select('*').order('empresa')
  ]);
  adminProfiles=profiles||[];
  adminOrders=(orders||[]).map(o=>({...o,profiles:adminProfiles.find(p=>p.id===o.user_id)||null}));
  const pend=adminOrders.filter(o=>o.status==='pending').length;
  const bdg=document.getElementById('pending-bdg');
  if(bdg){bdg.style.display=pend>0?'flex':'none';bdg.textContent=pend;}
}

// ═══════════════════════════════════════════════════════
// ADMIN NAVIGATION
// ═══════════════════════════════════════════════════════
function navAdmin(section,el){
  document.querySelectorAll('.nav-item').forEach(x=>x.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('content').dataset.section=section;
  if(window.innerWidth<=768)document.getElementById('sidebar').classList.remove('open');
  if(section==='stock-live'){
    document.getElementById('search-inp').oninput=function(){adminStockSearch=this.value.toLowerCase().trim();renderAdminStockLive();};
    document.getElementById('search-inp').placeholder='Buscar producto...';
  }
  const map={'stock-live':renderAdminStockLive,dash:renderAdminDash,orders:renderAdminOrders,prices:renderAdminPrices,products:renderAdminProducts};
  if(map[section])map[section]();
}

// ═══════════════════════════════════════════════════════
// STOCK EN VIVO
// ═══════════════════════════════════════════════════════
function renderAdminStockLive(){
  let prods=allProds.filter(p=>p.active!==false);
  if(adminStockSearch) prods=prods.filter(p=>p.name.toLowerCase().includes(adminStockSearch)||(p.brand_name||'').toLowerCase().includes(adminStockSearch));
  const totalStock=prods.reduce((s,p)=>s+p.stock,0);
  const okCount=prods.filter(p=>p.stock>3).length;
  const lowCount=prods.filter(p=>p.stock>0&&p.stock<=3).length;
  const outCount=prods.filter(p=>p.stock===0).length;
  const maxStock=Math.max(...prods.map(p=>p.stock),1);

  document.getElementById('content').dataset.section='stock-live';
  document.getElementById('content').innerHTML=`
    <div class="page-hdr">
      <div>
        <div class="page-title">STOCK <em>EN VIVO</em></div>
        <div class="page-sub"><span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--fluo);margin-right:4px;animation:blink 2.2s infinite"></span> Actualización en tiempo real · ${prods.length} productos</div>
      </div>
    </div>
    <div class="stock-dashboard">
      <div class="stock-summary">
        <div class="stock-summary-card"><div class="ssc-val">${totalStock}</div><div class="ssc-lbl">Unidades totales</div></div>
        <div class="stock-summary-card"><div class="ssc-val" style="color:var(--fluo)">${okCount}</div><div class="ssc-lbl">En stock</div></div>
        <div class="stock-summary-card ${lowCount?'alert':''}"><div class="ssc-val" style="color:var(--yellow)">${lowCount}</div><div class="ssc-lbl">Stock bajo</div></div>
        <div class="stock-summary-card ${outCount?'alert':''}"><div class="ssc-val" style="color:var(--red)">${outCount}</div><div class="ssc-lbl">Agotados</div></div>
      </div>
      <div class="stock-grid">
        ${prods.map((p,i)=>{
          const s=ss(p.stock);
          const pct=Math.min((p.stock/maxStock)*100,100);
          return`<div class="stock-grid-card ${s}" style="animation:fadeUp .2s ${i*.02}s both">
            <div class="sgc-top">
              <div class="sgc-ico">${p.icon_emoji||'📦'}</div>
              <div class="sgc-info">
                <div class="sgc-name">${p.name}</div>
                <div class="sgc-brand">${p.brand_name} · ${p.type}</div>
              </div>
            </div>
            <div class="sgc-stock">
              <div class="sgc-qty ${s}">${p.stock}<span style="font-family:'DM Sans';font-size:10px;color:var(--dim);font-weight:400;margin-left:2px">u</span></div>
              <div class="sgc-bar"><div class="sgc-bar-fill ${s}" style="width:${pct}%"></div></div>
            </div>
            <div class="sgc-edit">
              <input type="number" id="slv-${p.id}" value="${p.stock}" min="0">
              <button onclick="qkStock('${p.id}')">✓</button>
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>`;
}

// ═══════════════════════════════════════════════════════
// DASHBOARD
// ═══════════════════════════════════════════════════════
function renderAdminDash(){
  const conf=adminOrders.filter(o=>['confirmed','partial','dispatched'].includes(o.status));
  const pend=adminOrders.filter(o=>o.status==='pending');
  const rev=conf.reduce((s,o)=>s+Number(o.total_usd||0),0);
  const crit=allProds.filter(p=>p.active&&p.stock<=3);
  document.getElementById('content').dataset.section='dash';
  document.getElementById('content').innerHTML=`
    <div class="page-hdr"><div class="page-title">RESUMEN <em>GENERAL</em></div></div>
    <div class="stat-grid">
      <div class="stat-box hi"><div class="stat-ico">📋</div><div class="stat-lbl">Pedidos pendientes</div><div class="stat-val">${pend.length}</div></div>
      <div class="stat-box"><div class="stat-ico">✅</div><div class="stat-lbl">Confirmados</div><div class="stat-val">${conf.length}</div></div>
      <div class="stat-box"><div class="stat-ico">💵</div><div class="stat-lbl">Facturación total</div><div class="stat-val" style="font-size:20px">USD ${rev.toLocaleString()}</div></div>
      <div class="stat-box"><div class="stat-ico">⚠️</div><div class="stat-lbl">Stock crítico</div><div class="stat-val" style="color:var(--yellow)">${crit.length}</div></div>
    </div>
    ${pend.length?`<div class="tbl-wrap"><div class="tbl-hdr"><div class="tbl-title">⚡ PENDIENTES</div></div>
    <table class="dt"><thead><tr><th>Orden</th><th>Distribuidor</th><th>Total</th><th>Acciones</th></tr></thead>
    <tbody>${pend.slice(0,5).map(o=>`<tr>
      <td style="font-family:'Bebas Neue';font-size:16px;color:var(--red)">${o.order_number||'—'}</td>
      <td><div style="font-weight:600;font-size:12px">${o.profiles?.empresa||'—'}</div></td>
      <td style="font-family:'Bebas Neue';font-size:16px">USD ${Number(o.total_usd||0).toLocaleString()}</td>
      <td><div style="display:flex;gap:5px"><button class="btn-sm btn-sm-o" onclick="openOrderDetail('${o.id}')">Ver</button><button class="btn-sm btn-sm-r" onclick="updOrderStatus('${o.id}','confirmed')">✓ OK</button></div></td>
    </tr>`).join('')}</tbody></table></div>`:``}`;
}

// ═══════════════════════════════════════════════════════
// ORDERS
// ═══════════════════════════════════════════════════════
function renderAdminOrders(filt='all',q=''){
  let orders=[...adminOrders];
  if(filt!=='all')orders=orders.filter(o=>o.status===filt);
  if(q){const s=q.toLowerCase();orders=orders.filter(o=>(o.order_number||'').toLowerCase().includes(s)||(o.profiles?.empresa||'').toLowerCase().includes(s));}
  const sc={pending:{l:'Pendiente',c:'bdg-y'},confirmed:{l:'Confirmado',c:'bdg-g'},partial:{l:'Parcial',c:'bdg-y'},cancelled:{l:'Cancelado',c:'bdg-r'},dispatched:{l:'Despachado',c:'bdg-b'}};
  document.getElementById('content').dataset.section='orders';
  document.getElementById('content').innerHTML=`
    <div class="page-hdr"><div class="page-title">PEDIDOS <em>RECIBIDOS</em></div></div>
    <div style="display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap">
      <div class="search-box" style="max-width:260px;height:32px"><span style="color:var(--dim);font-size:12px">🔍</span><input type="text" placeholder="Buscar..." oninput="renderAdminOrders(document.getElementById('ofs').value,this.value)" style="font-size:11px"></div>
      <select class="form-sel" id="ofs" style="height:32px;width:auto" onchange="renderAdminOrders(this.value)"><option value="all">Todos</option><option value="pending">Pendientes</option><option value="confirmed">Confirmados</option><option value="dispatched">Despachados</option><option value="cancelled">Cancelados</option></select>
    </div>
    <div class="tbl-wrap"><div class="tbl-hdr"><div class="tbl-title">${orders.length} PEDIDOS</div></div>
    <table class="dt"><thead><tr><th>Orden</th><th>Distribuidor</th><th>Estado</th><th>Total</th><th>Fecha</th><th>Acciones</th></tr></thead>
    <tbody>${orders.length?orders.map(o=>{const s=sc[o.status]||{l:o.status,c:'bdg-b'};return`<tr>
      <td style="font-family:'Bebas Neue';font-size:15px;color:var(--red)">${o.order_number||'—'}</td>
      <td><div style="font-weight:600;font-size:12px">${o.profiles?.empresa||'—'}</div><div style="font-size:10px;color:var(--dim)">${o.profiles?.nombre||''}</div></td>
      <td><span class="bdg ${s.c}">${s.l}</span></td>
      <td style="font-family:'Bebas Neue';font-size:15px">USD ${Number(o.total_usd||0).toLocaleString()}</td>
      <td style="font-size:11px;color:var(--muted)">${new Date(o.created_at).toLocaleDateString('es-AR',{day:'2-digit',month:'short'})}</td>
      <td><div style="display:flex;gap:4px;flex-wrap:wrap">
        <button class="btn-sm btn-sm-o" onclick="openOrderDetail('${o.id}')">Ver</button>
        ${o.status==='pending'?`<button class="btn-sm btn-sm-r" onclick="updOrderStatus('${o.id}','confirmed')">✓</button>`:''}
        ${o.status==='confirmed'?`<button class="btn-sm btn-sm-o" onclick="updOrderStatus('${o.id}','dispatched')">📦</button>`:''}
        ${['pending','confirmed'].includes(o.status)?`<button class="btn-sm btn-sm-o" style="color:#ff6060" onclick="updOrderStatus('${o.id}','cancelled')">✕</button>`:''}
      </div></td></tr>`;}).join(''):`<tr><td colspan="6" style="text-align:center;padding:40px;color:var(--dim)">Sin pedidos</td></tr>`}</tbody></table></div>`;
}

async function updOrderStatus(id,status){
  await db.from('orders').update({status}).eq('id',id);
  const i=adminOrders.findIndex(o=>o.id===id);if(i!==-1)adminOrders[i].status=status;
  const pend=adminOrders.filter(o=>o.status==='pending').length;
  const bdg=document.getElementById('pending-bdg');if(bdg){bdg.style.display=pend>0?'flex':'none';bdg.textContent=pend;}
  const sect=document.getElementById('content').dataset.section;
  if(sect==='orders')renderAdminOrders();if(sect==='dash')renderAdminDash();
  toast(`Estado: ${status}`);
}

async function openOrderDetail(orderId){
  const order=adminOrders.find(o=>o.id===orderId);if(!order)return;
  const{data:items}=await db.from('order_items').select('*').eq('order_id',orderId);
  const sc={pending:'bdg-y',confirmed:'bdg-g',partial:'bdg-y',cancelled:'bdg-r',dispatched:'bdg-b'};
  const sl={pending:'Pendiente',confirmed:'Confirmado',partial:'Parcial',cancelled:'Cancelado',dispatched:'Despachado'};
  document.getElementById('od-title').textContent=order.order_number||'—';
  document.getElementById('od-date').textContent=new Date(order.created_at).toLocaleDateString('es-AR',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  document.getElementById('od-body').innerHTML=`
    <div style="display:grid;grid-template-columns:1fr auto;gap:10px;margin-bottom:14px">
      <div style="background:var(--bg3);border-radius:7px;padding:12px">
        <div style="font-size:9px;color:var(--dim);letter-spacing:2px;text-transform:uppercase;margin-bottom:5px">Distribuidor</div>
        <div style="font-size:15px;font-weight:700">${order.profiles?.empresa||'—'}</div>
        <div style="font-size:11px;color:var(--muted)">${order.profiles?.nombre||''}</div>
        <div style="font-size:10px;color:var(--dim);margin-top:3px">CUIT: ${order.profiles?.cuit||'—'}</div>
      </div>
      <div style="background:var(--bg3);border-radius:7px;padding:12px;min-width:130px">
        <div style="font-size:9px;color:var(--dim);letter-spacing:2px;text-transform:uppercase;margin-bottom:5px">Estado</div>
        <span class="bdg ${sc[order.status]||'bdg-b'}">${sl[order.status]||order.status}</span>
        <div style="margin-top:8px;font-size:9px;color:var(--dim)">Total</div>
        <div style="font-family:'Bebas Neue';font-size:20px;color:var(--red)">USD ${Number(order.total_usd||0).toLocaleString()}</div>
      </div>
    </div>
    <div style="font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--dim);margin-bottom:8px">Ítems</div>
    <div style="display:flex;flex-direction:column;gap:7px">
    ${(items||[]).map(it=>`<div style="background:var(--bg3);border-radius:7px;padding:10px 12px;display:flex;align-items:center;gap:10px">
      <div style="flex:1"><div style="font-weight:600;font-size:12px">${it.product_name}</div><div style="font-size:9px;color:var(--dim);text-transform:uppercase;letter-spacing:1px">${it.product_brand}</div></div>
      <div style="font-family:'Bebas Neue';font-size:18px;color:var(--muted)">${it.quantity}u</div>
      <div style="text-align:right"><div style="font-size:10px;color:var(--dim)">c/u USD ${Number(it.unit_price).toLocaleString()}</div><div style="font-family:'Bebas Neue';font-size:14px">USD ${Number(it.subtotal||it.unit_price*it.quantity).toLocaleString()}</div></div>
      <span class="bdg ${it.stock_status==='ok'?'bdg-g':'bdg-y'}">${it.stock_status==='ok'?'OK':'Revisar'}</span>
    </div>`).join('')}</div>`;
  document.getElementById('od-foot').innerHTML=`
    <button class="btn-sm btn-sm-o" onclick="closeOverlay('order-detail-overlay')">Cerrar</button>
    ${order.status==='pending'?`<button class="btn-sm btn-sm-r" onclick="updOrderStatus('${order.id}','confirmed');closeOverlay('order-detail-overlay')">✓ Confirmar</button>`:''}
    ${order.status==='confirmed'?`<button class="btn-sm btn-sm-o" onclick="updOrderStatus('${order.id}','dispatched');closeOverlay('order-detail-overlay')">📦 Despachar</button>`:''}`;
  document.getElementById('order-detail-overlay').classList.add('open');
}

function renderAdminPrices(brand='all'){
  let prods=brand==='all'?allProds:allProds.filter(p=>p.brand===brand);
  document.getElementById('content').dataset.section='prices';
  document.getElementById('content').innerHTML=`
    <div class="page-hdr"><div class="page-title">EDITAR <em>PRECIOS</em></div><small style="font-size:11px;color:var(--dim)">Todos en USD</small></div>
    <div style="margin-bottom:12px"><select class="form-sel" style="width:auto;height:32px" onchange="renderAdminPrices(this.value)"><option value="all">Todas las marcas</option><option value="langfeite">Langfeite</option><option value="ado">A Dece Oasis</option><option value="eride">E Ride Pro</option></select></div>
    <div class="tbl-wrap"><div class="tbl-hdr"><div class="tbl-title">${prods.length} PRODUCTOS</div></div>
    <table class="dt"><thead><tr><th>Producto</th><th>Público</th><th>x5</th><th>x10</th><th>x15</th><th>x20</th><th></th></tr></thead>
    <tbody>${prods.map(p=>`<tr id="pr-${p.id}">
      <td><div style="font-weight:600;font-size:12px">${p.name}</div><div style="font-size:9px;color:var(--dim);text-transform:uppercase;letter-spacing:1px">${p.brand_name}</div></td>
      ${['price_publico','price_x5','price_x10','price_x15','price_x20'].map(k=>`<td><input type="number" class="ie-input" id="pr-${p.id}-${k}" value="${p[k]||''}" placeholder="—" style="width:70px"></td>`).join('')}
      <td><button class="ie-btn sv" onclick="savePrice('${p.id}')">✓</button></td>
    </tr>`).join('')}</tbody></table></div>`;
}

async function savePrice(id){
  const keys=['price_publico','price_x5','price_x10','price_x15','price_x20'];
  const upd={};keys.forEach(k=>{const v=document.getElementById(`pr-${id}-${k}`)?.value;upd[k]=v?parseFloat(v):null;});
  await db.from('products').update(upd).eq('id',id);
  const i=allProds.findIndex(p=>p.id===id);if(i!==-1)allProds[i]={...allProds[i],...upd};
  toast('Precios guardados');
  const row=document.getElementById(`pr-${id}`);if(row){row.style.background='rgba(191,255,0,.06)';setTimeout(()=>row.style.background='',1200);}
}

// ═══════════════════════════════════════════════════════
// PRODUCTS CRUD

function renderAdminProducts(brand='all'){
  let prods=brand==='all'?allProds:allProds.filter(p=>p.brand===brand);
  document.getElementById('content').dataset.section='products';
  document.getElementById('content').innerHTML=`
    <div class="page-hdr"><div class="page-title">GESTIÓN <em>PRODUCTOS</em></div><button class="btn-sm btn-sm-r" onclick="openProdEdit(null)">+ Nuevo</button></div>
    <div style="margin-bottom:12px"><select class="form-sel" style="width:auto;height:32px" onchange="renderAdminProducts(this.value)"><option value="all">Todas las marcas</option><option value="langfeite">Langfeite</option><option value="ado">A Dece Oasis</option><option value="eride">E Ride Pro</option></select></div>
    <div class="tbl-wrap"><div class="tbl-hdr"><div class="tbl-title">${prods.length} PRODUCTOS</div></div>
    <table class="dt"><thead><tr><th>Producto</th><th>Tipo</th><th>Precio x5</th><th>Stock</th><th>Estado</th><th>Acciones</th></tr></thead>
    <tbody>${prods.map(p=>`<tr>
      <td><div style="display:flex;align-items:center;gap:7px"><span style="font-size:18px">${p.icon_emoji||'📦'}</span><div><div style="font-weight:600;font-size:12px">${p.name}</div><div style="font-size:9px;color:var(--dim);text-transform:uppercase;letter-spacing:1px">${p.brand_name}</div></div></div></td>
      <td style="font-size:11px;color:var(--muted)">${p.type}</td>
      <td style="font-family:'Bebas Neue';font-size:15px">USD ${p.price_x5?Number(p.price_x5).toLocaleString():'—'}</td>
      <td><span class="bdg ${p.stock>=10?'bdg-g':p.stock>0?'bdg-y':'bdg-r'}">${p.stock}u</span></td>
      <td><label class="toggle-sw"><input type="checkbox" ${p.active?'checked':''} onchange="toggleProd('${p.id}',${p.active})"><span class="ts-track"></span></label></td>
      <td><div style="display:flex;gap:4px"><button class="btn-sm btn-sm-o" onclick="openProdEdit('${p.id}')">Editar</button><button class="btn-sm btn-sm-o" style="color:#ff6060" onclick="deleteProd('${p.id}','${p.name.replace(/'/g,'')}')">🗑</button></div></td>
    </tr>`).join('')}</tbody></table></div>`;
}

function openProdEdit(id){
  editingProdId=id;
  document.getElementById('pe-title').textContent=id?'EDITAR PRODUCTO':'NUEVO PRODUCTO';
  if(id){
    const p=allProds.find(x=>x.id===id);if(!p)return;
    document.getElementById('pe-brand').value=p.brand;document.getElementById('pe-type').value=p.type;
    document.getElementById('pe-name').value=p.name;document.getElementById('pe-desc').value=p.description||'';
    document.getElementById('pe-emoji').value=p.icon_emoji||'';document.getElementById('pe-stock').value=p.stock;
    document.getElementById('pe-pub').value=p.price_publico||'';document.getElementById('pe-x5').value=p.price_x5||'';
    document.getElementById('pe-x10').value=p.price_x10||'';document.getElementById('pe-x15').value=p.price_x15||'';
    document.getElementById('pe-x20').value=p.price_x20||'';document.getElementById('pe-sort').value=p.sort_order||0;
    document.getElementById('pe-specs').value=p.specs?JSON.stringify(p.specs,null,2):'';
    document.getElementById('pe-imgs').value=(p.image_urls||[]).join('\n');
  } else {
    ['pe-name','pe-desc','pe-emoji','pe-stock','pe-pub','pe-x5','pe-x10','pe-x15','pe-x20','pe-sort','pe-specs','pe-imgs'].forEach(id=>document.getElementById(id).value='');
  }
  document.getElementById('prod-edit-overlay').classList.add('open');
}
function closeProdEdit(){document.getElementById('prod-edit-overlay').classList.remove('open');}

async function saveProd(){
  const btn=document.getElementById('btn-pe-save');btn.disabled=true;btn.textContent='Guardando...';
  let specs={};try{const r=document.getElementById('pe-specs').value.trim();if(r)specs=JSON.parse(r);}catch(e){toast('JSON de specs inválido',true);btn.disabled=false;btn.textContent='Guardar →';return;}
  const bn={langfeite:'Langfeite',ado:'A Dece Oasis',eride:'E Ride Pro'};
  const brand=document.getElementById('pe-brand').value;
  const payload={brand,brand_name:bn[brand]||brand,type:document.getElementById('pe-type').value,name:document.getElementById('pe-name').value.trim(),description:document.getElementById('pe-desc').value.trim(),icon_emoji:document.getElementById('pe-emoji').value.trim()||'📦',stock:parseInt(document.getElementById('pe-stock').value)||0,price_publico:parseFloat(document.getElementById('pe-pub').value)||null,price_x5:parseFloat(document.getElementById('pe-x5').value)||null,price_x10:parseFloat(document.getElementById('pe-x10').value)||null,price_x15:parseFloat(document.getElementById('pe-x15').value)||null,price_x20:parseFloat(document.getElementById('pe-x20').value)||null,sort_order:parseInt(document.getElementById('pe-sort').value)||0,specs,image_urls:document.getElementById('pe-imgs').value.trim().split('\n').filter(Boolean),active:true};
  if(!payload.name){toast('El nombre es obligatorio',true);btn.disabled=false;btn.textContent='Guardar →';return;}
  let error;
  if(editingProdId){({error}=await db.from('products').update(payload).eq('id',editingProdId));if(!error){const i=allProds.findIndex(p=>p.id===editingProdId);if(i!==-1)allProds[i]={...allProds[i],...payload};}}
  else{const{data,error:e}=await db.from('products').insert(payload).select().single();error=e;if(!error&&data)allProds.push(data);}
  if(error)toast('Error: '+error.message,true);
  else{toast(editingProdId?'Producto actualizado':'Producto creado');closeProdEdit();renderAdminProducts();}
  btn.disabled=false;btn.textContent='Guardar →';
}

async function deleteProd(id,name){
  if(!confirm(`¿Eliminar "${name}"?`))return;
  await db.from('products').update({active:false}).eq('id',id);
  const i=allProds.findIndex(p=>p.id===id);if(i!==-1)allProds[i].active=false;
  toast('Producto eliminado');renderAdminProducts();
}

async function qkStock(id){
  const el=document.getElementById(`slv-${id}`);
  if(!el)return;const v=parseInt(el.value);if(isNaN(v)||v<0){toast('Stock inválido',true);return;}
  await db.from('products').update({stock:v}).eq('id',id);
  const i=allProds.findIndex(p=>p.id===id);if(i!==-1)allProds[i].stock=v;
  toast('Stock actualizado');
  const sect=document.getElementById('content').dataset.section;
  if(sect==='stock-live')renderAdminStockLive();if(sect==='dash')renderAdminDash();
}

async function toggleProd(id,cur){
  await db.from('products').update({active:!cur}).eq('id',id);
  const i=allProds.findIndex(p=>p.id===id);if(i!==-1)allProds[i].active=!cur;
  toast(!cur?'Producto activado':'Producto pausado');renderAdminProducts();
}

// ═══════════════════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════════════════
function overlayClick(e,id){if(e.target.id===id)closeOverlay(id);}
function closeOverlay(id){document.getElementById(id).classList.remove('open');}
function toggleSidebar(){document.getElementById('sidebar').classList.toggle('open');}

let tTimer;
function toast(msg,err=false){
  const el=document.getElementById('toast');
  document.getElementById('t-ico').textContent=err?'⚠':'✓';
  document.getElementById('t-msg').textContent=msg;
  el.classList.toggle('err',err);el.classList.add('show');
  clearTimeout(tTimer);tTimer=setTimeout(()=>el.classList.remove('show'),3000);
}

document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){closeOverlay('prod-edit-overlay');closeOverlay('order-detail-overlay');}
});

const styleAnim=document.createElement('style');
styleAnim.textContent='@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}@keyframes blink{0%,100%{opacity:1}55%{opacity:.25}}';
document.head.appendChild(styleAnim);

init();
</script>
